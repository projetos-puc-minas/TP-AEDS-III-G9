<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BiblioSys — Painel Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">B</div>
      <div>
        <div class="logo-title">BiblioSys</div>
        <div class="logo-sub">Painel Admin · G9</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Acervo</div>
      <button class="nav-item active" data-module="livros">
        <span class="nav-icon">📖</span>
        <span>Livros</span>
        <span class="nav-badge" id="badge-livros">0</span>
      </button>
      <button class="nav-item" data-module="editoras">
        <span class="nav-icon">🏛</span>
        <span>Editoras</span>
        <span class="nav-badge" id="badge-editoras">0</span>
      </button>

      <div class="nav-section-label">Pessoas</div>
      <button class="nav-item" data-module="autores">
        <span class="nav-icon">✍️</span>
        <span>Autores</span>
        <span class="nav-badge" id="badge-autores">0</span>
      </button>
      <button class="nav-item" data-module="usuarios">
        <span class="nav-icon">👤</span>
        <span>Usuários</span>
        <span class="nav-badge" id="badge-usuarios">0</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <span class="status-dot"></span>
      <span class="status-text">API conectada</span>
      <button class="theme-toggle" id="theme-toggle" title="Alternar tema">
        <span class="theme-toggle-icon active" id="icon-light">☀️</span>
        <span class="theme-toggle-icon" id="icon-dark">🌙</span>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title" id="page-title">Livros</h1>
        <span class="page-subtitle" id="page-subtitle">Gerencie o acervo</span>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="search-input" placeholder="Pesquisar..." />
          <kbd class="search-kbd">⌘K</kbd>
        </div>
        <button class="btn btn-primary" id="btn-new">+ Novo</button>
      </div>
    </header>

    <!-- FILTER BAR -->
    <div class="filter-bar" id="filter-bar">
      <div class="filter-chips" id="filter-chips"></div>
      <div class="sort-wrap">
        <label class="sort-label">Ordenar:</label>
        <select class="sort-select" id="sort-select">
          <option value="id-asc">ID ↑</option>
          <option value="id-desc">ID ↓</option>
        </select>
      </div>
    </div>

    <!-- TABLE AREA -->
    <div class="table-wrap">
      <div class="table-loading" id="table-loading">
        <div class="spinner"></div>
        <span>Carregando…</span>
      </div>
      <div class="table-empty" id="table-empty" style="display:none">
        <div class="empty-icon">📭</div>
        <div>Nenhum registro encontrado</div>
      </div>
      <table class="data-table" id="data-table" style="display:none">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>
  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Novo Registro</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">Cancelar</button>
        <button class="btn btn-primary" id="modal-save">Salvar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-container" id="toast-container"></div>

  <!-- CONFIRM DIALOG -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-dialog">
      <div class="confirm-icon">⚠️</div>
      <div class="confirm-title" id="confirm-title">Confirmar exclusão</div>
      <div class="confirm-msg" id="confirm-msg">Deseja realmente excluir este registro?</div>
      <div class="confirm-actions">
        <button class="btn btn-ghost" id="confirm-cancel">Cancelar</button>
        <button class="btn btn-danger" id="confirm-ok">Excluir</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Theme toggle
    const html = document.documentElement;
    const btn  = document.getElementById('theme-toggle');
    const iconLight = document.getElementById('icon-light');
    const iconDark  = document.getElementById('icon-dark');

    const saved = localStorage.getItem('bibliosys-theme') || 'light';
    applyTheme(saved);

    btn.addEventListener('click', () => {
      const next = html.dataset.theme === 'light' ? 'dark' : 'light';
      applyTheme(next);
      localStorage.setItem('bibliosys-theme', next);
    });

    function applyTheme(t) {
      html.dataset.theme = t;
      iconLight.classList.toggle('active', t === 'light');
      iconDark.classList.toggle('active', t === 'dark');
    }
  </script>
</body>
</html>
