<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca Pessoal · AEDsIII G9</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="layout">

    <!-- ═══════════ SIDEBAR ═══════════ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">📚</div>
        <div class="brand-text">
          <span class="brand-name">Biblioteca</span>
          <span class="brand-sub">AEDsIII · G9</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="livros">
          <span class="nav-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
          </span>
          <span>Livros</span>
        </button>

        <button class="nav-item" data-view="editoras">
          <span class="nav-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </span>
          <span>Editoras</span>
        </button>

        <button class="nav-item" data-view="tags">
          <span class="nav-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
              <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
          </span>
          <span>Tags</span>
        </button>
      </nav>

      <div class="sidebar-stats">
        <div class="stat-item">
          <span class="stat-value" id="statLivros">—</span>
          <span class="stat-label">livros</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-value" id="statEditoras">—</span>
          <span class="stat-label">editoras</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-value" id="statTags">—</span>
          <span class="stat-label">tags</span>
        </div>
      </div>

      <div class="sidebar-footer">B+ Tree · Hash Extensível</div>
    </aside>

    <!-- ═══════════ MAIN ═══════════ -->
    <div class="main-wrap">

      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="3" y1="6"  x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div>
            <p class="breadcrumb">Biblioteca Pessoal</p>
            <h1 class="view-title" id="viewTitle">Livros</h1>
          </div>
        </div>
        <div class="topbar-right">
          <div class="search-wrap">
            <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar…" autocomplete="off" />
          </div>
          <button class="btn btn-primary" id="btnNovo">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Novo
          </button>
        </div>
      </header>

      <main class="content-area" id="contentArea">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Conectando ao servidor…</p>
        </div>
      </main>

    </div>
  </div>

  <!-- ═══════════ MODAL CRUD ═══════════ -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose" aria-label="Fechar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modalCancel">Cancelar</button>
        <button class="btn btn-primary" id="modalSave">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ MODAL DETALHES ═══════════ -->
  <div class="modal-backdrop" id="detailBackdrop">
    <div class="modal modal-lg" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="detailTitle">Detalhes</h2>
        <button class="modal-close" id="detailClose" aria-label="Fechar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="detailBody"></div>
    </div>
  </div>

  <!-- ═══════════ MODAL CONFIRMAR ═══════════ -->
  <div class="modal-backdrop" id="confirmBackdrop">
    <div class="modal modal-sm" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title">Confirmar exclusão</h2>
      </div>
      <div class="modal-body">
        <p id="confirmMsg" class="confirm-msg"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Cancelar</button>
        <button class="btn btn-danger" id="confirmOk">Excluir</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ TOASTS ═══════════ -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
